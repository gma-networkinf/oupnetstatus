owner: gma-networkinf # Your GitHub organization or username, where this repository lives
repo: oupnetstatus # The name of this repository

sites:
  - name: OUP TV Mobile
    url: https://desktop.ouptv.ru
  - name: OUP TV Desktop
    url: https://desktop.ouptv.ru
  - name: OUP Passport Authorization Service
    url: https://passport.ouptv.ru
  - name: OUP Player
    url: https://view.ouptv.ru
  - name: Redirect domain ZERO
    url: https://ouptv.ru
  - name: Redirect domain WWW
    url: https://www.ouptv.ru
  - name: GMA Customer Center
    url: https://customercenter.ouptv.ru
  - name: OUP Universe
    url: https://universe.ouptv.ru
  - name: KIOSK RU
    url: https://kiosk.ouptv.ru
  - name: TOCHKA TV RU
    url: https://tochka.ouptv.ru
  - name: CHECKPERSON CAPTCHA
    url: https://checkperson.ouptv.ru
